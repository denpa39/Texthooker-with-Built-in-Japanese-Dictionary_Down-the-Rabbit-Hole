<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Down the Rabbit Hole</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/settings.js"></script>
</head>
<body>
<header id="toolbar">
  <span class="brand"><span class="brand-text">Down&nbsp;the&nbsp;Rabbit&nbsp;Hole</span></span>
  <span id="status" class="status connecting" role="status" title="Connecting…" aria-label="Connecting"></span>
  <span id="stats" class="stats" title="Characters read this session · reading speed"></span>
  <span class="spacer"></span>
  <button id="attachBtn" title="Attach to a game — embedded Textractor, no clipboard needed">Attach</button>
  <button id="pauseBtn" title="Pause / resume clipboard capture">Pause</button>
  <button id="furiBtn" title="Toggle furigana readings">Furigana</button>
  <div id="alignSeg" class="seg" role="group" aria-label="Text alignment">
    <button data-align="left" title="Align left" aria-label="Align left"><svg viewBox="0 0 16 16" aria-hidden="true"><g fill="currentColor"><rect x="2" y="2.5" width="11" height="1.6" rx=".8"/><rect x="2" y="6" width="7" height="1.6" rx=".8"/><rect x="2" y="9.5" width="11" height="1.6" rx=".8"/><rect x="2" y="13" width="6" height="1.6" rx=".8"/></g></svg></button>
    <button data-align="center" title="Center" aria-label="Center"><svg viewBox="0 0 16 16" aria-hidden="true"><g fill="currentColor"><rect x="2.5" y="2.5" width="11" height="1.6" rx=".8"/><rect x="4.5" y="6" width="7" height="1.6" rx=".8"/><rect x="2.5" y="9.5" width="11" height="1.6" rx=".8"/><rect x="5" y="13" width="6" height="1.6" rx=".8"/></g></svg></button>
    <button data-align="right" title="Align right" aria-label="Align right"><svg viewBox="0 0 16 16" aria-hidden="true"><g fill="currentColor"><rect x="3" y="2.5" width="11" height="1.6" rx=".8"/><rect x="7" y="6" width="7" height="1.6" rx=".8"/><rect x="3" y="9.5" width="11" height="1.6" rx=".8"/><rect x="8" y="13" width="6" height="1.6" rx=".8"/></g></svg></button>
    <button data-align="justify" title="Justify" aria-label="Justify"><svg viewBox="0 0 16 16" aria-hidden="true"><g fill="currentColor"><rect x="2" y="2.5" width="12" height="1.6" rx=".8"/><rect x="2" y="6" width="12" height="1.6" rx=".8"/><rect x="2" y="9.5" width="12" height="1.6" rx=".8"/><rect x="2" y="13" width="12" height="1.6" rx=".8"/></g></svg></button>
  </div>
  <button id="setBtn" title="Appearance: theme, colours, font">Theme</button>
  <label class="fontctl">A
    <input id="fontRange" type="range" min="16" max="56" step="1" value="30" aria-label="Reader text size">
    <output id="fontVal">30</output>
  </label>
  <button id="exportBtn" title="Download this session as a .txt file" aria-label="Export session">Export</button>
  <button id="clearBtn" title="Undo — remove the most recent line" aria-label="Undo last line">Undo</button>
  <button id="clearAllBtn" class="icon-btn" title="Clear all lines" aria-label="Clear all lines">Clear</button>
</header>

<aside id="settings" class="settings hidden" aria-label="Appearance settings">
  <div class="set-head"><b>Appearance</b><button id="setClose" class="set-x" title="close">×</button></div>
  <div class="set-label">Theme</div>
  <div id="presetRow" class="presets"></div>
  <div class="set-label">Colours</div>
  <div id="colorRow" class="colors"></div>
  <div class="set-label">Font (use the "A" slider for size)</div>
  <select id="fontSelect"></select>
  <div class="set-label">Spacing</div>
  <label class="set-slider">Line height
    <input id="lineHeightRange" type="range" min="1.3" max="3" step="0.1" aria-label="Line height">
    <output id="lineHeightVal"></output>
  </label>
  <label class="set-slider">Furigana size
    <input id="furiRange" type="range" min="0.3" max="0.7" step="0.05" aria-label="Furigana size">
    <output id="furiVal"></output>
  </label>
  <div class="style-toggles">
    <button id="boldToggle" class="style-toggle" title="Toggle bold reader text" aria-pressed="false"><b>B</b></button>
    <button id="italicToggle" class="style-toggle" title="Toggle italic reader text" aria-pressed="false"><i>I</i></button>
  </div>
  <button id="setReset" class="set-reset">Reset to default</button>
</aside>

<aside id="hookPanel" class="settings hidden" aria-label="Attach to game">
  <div class="set-head"><b>Attach to game</b><button id="hookClose" class="set-x" title="close">×</button></div>
  <div id="hookMsg" class="hook-msg"></div>
  <div id="procList" class="proc-list"></div>
  <div id="hookList" class="hook-list"></div>
  <button id="detachBtn" class="set-reset hidden">Detach</button>
</aside>

<main id="lines" lang="ja"></main>

<div id="popup" class="popup hidden" role="dialog" aria-label="Dictionary entry"></div>

<div id="hint" class="hint">
  Copy Japanese text (or hook a game with <b>Textractor</b> → Clipboard output) and it
  appears here. <b>Hover</b> a word for its meaning — <b>click</b> to keep it open
  (<b>wheel</b> scrolls the popup, <b>Esc</b> closes it).
</div>

<script src="/static/kuromoji/kuromoji.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
